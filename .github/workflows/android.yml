name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Set up Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Create Keystore
      run: |
        mkdir -p android/app
        keytool -genkey -v -keystore android/app/release.keystore -alias billiards_alias -keyalg RSA -keysize 2048 -validity 10000 -storepass password123 -keypass password123 -dname "CN=Billiards, OU=Gaming, O=BilliardsApp, L=Jakarta, S=Jakarta, C=ID"

    - name: Build and Sign APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew clean assembleRelease --warning-mode all --stacktrace \
          -PRELEASE_STORE_FILE=app/release.keystore \
          -PRELEASE_STORE_PASSWORD=password123 \
          -PRELEASE_KEY_ALIAS=billiards_alias \
          -PRELEASE_KEY_PASSWORD=password123

    - name: Build and Sign AAB
      run: |
        cd android
        chmod +x gradlew
        ./gradlew bundleRelease --warning-mode all --stacktrace \
          -PRELEASE_STORE_FILE=app/release.keystore \
          -PRELEASE_STORE_PASSWORD=password123 \
          -PRELEASE_KEY_ALIAS=billiards_alias \
          -PRELEASE_KEY_PASSWORD=password123

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release-apk
        path: android/app/build/outputs/apk/release/*.apk

    - name: Upload AAB
      uses: actions/upload-artifact@v4
      with:
        name: app-release-aab
        path: android/app/build/outputs/bundle/release/*.aab
