name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 20
      uses: actions/setup-java@v4
      with:
        java-version: '20'
        distribution: 'temurin'
        cache: gradle

    - name: Set up Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Grant execute permission for gradlew
      run: chmod +x android/gradlew
      continue-on-error: true

    - name: Create Keystore
      run: |
        keytool -genkey -v -keystore android/app/release.keystore -alias billiards_alias -keyalg RSA -keysize 2048 -validity 10000 -storepass password123 -keypass password123 -dname "CN=Billiards, OU=Gaming, O=BilliardsApp, L=Jakarta, S=Jakarta, C=ID"

    - name: Build and Sign APK & AAB
      run: |
        cd android
        if [ ! -f gradlew ]; then
          gradle wrapper
        fi
        ./gradlew assembleRelease bundleRelease \
          -Pandroid.injected.signing.store.file=release.keystore \
          -Pandroid.injected.signing.store.password=password123 \
          -Pandroid.injected.signing.key.alias=billiards_alias \
          -Pandroid.injected.signing.key.password=password123

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release-apk
        path: android/app/build/outputs/apk/release/*.apk

    - name: Upload AAB
      uses: actions/upload-artifact@v4
      with:
        name: app-release-aab
        path: android/app/build/outputs/bundle/release/*.aab
